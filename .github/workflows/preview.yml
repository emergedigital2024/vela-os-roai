name: PR Preview

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Upload preview version
        id: upload
        # Uploads a NEW Worker version (not promoted to production) and prints a
        # per-version Preview URL. Secrets (e.g. METRONOME_API_KEY) are shared
        # across versions, so the Live panel works in the preview too.
        run: |
          set -o pipefail
          out=$(npx --yes wrangler@4 versions upload 2>&1) || { echo "$out"; exit 1; }
          echo "$out"
          url=$(printf '%s\n' "$out" | grep -oiE 'https://[a-z0-9.-]+\.workers\.dev' | tail -1)
          echo "url=$url" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Comment preview URL on the PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = "${{ steps.upload.outputs.url }}".trim();
            const marker = "<!-- vela-pr-preview -->";
            const body = url
              ? `${marker}\n🚀 **Preview deployed** for this PR (isolated Worker version — production is untouched):\n\n${url}\n\nIt redeploys on every push to this PR and reads the same Metronome sandbox secret.`
              : `${marker}\n⚠️ Preview upload ran but no preview URL was parsed — see the workflow logs. (If preview URLs are disabled, enable them in the Worker's Settings → Domains & Routes.)`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
