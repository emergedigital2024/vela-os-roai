<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vela OS · FPT CX Services — ROAI Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: "class", theme: { extend: { fontFamily: { sans: ["Geist", "system-ui", "sans-serif"], mono: ["Geist Mono", "ui-monospace", "monospace"] } } } };
  </script>
  <style>
    :root, html.dark {
      --bg: #08080b; --bg-blur: rgba(9,9,13,0.72);
      --panel: #111118; --panel-2: #0c0c12; --panel-hi: #17171f;
      --hero: linear-gradient(155deg, #14141d 0%, #0c0c13 60%);
      --chip: #1a1a22; --track: #26262f;
      --border: rgba(255,255,255,0.07); --border-strong: rgba(255,255,255,0.15);
      --text: #f3f3f6; --muted: #9c9caa; --faint: #62626d;
      --accent: #4f46e5; --accent-hover: #4338ca; --accent-fg: #a5b4fc;
      --accent-soft: rgba(99,102,241,0.13); --accent-line: rgba(99,102,241,0.26);
      --tip: #1a1a22; --grid: rgba(255,255,255,0.055); --axis: #6c6c77;
    }
    html.light {
      --bg: #f6f6f9; --bg-blur: rgba(246,246,249,0.72);
      --panel: #ffffff; --panel-2: #fbfbfd; --panel-hi: #f3f3f7;
      --hero: linear-gradient(155deg, #ffffff 0%, #f3f2fb 100%);
      --chip: #f1f1f5; --track: #e6e6ec;
      --border: rgba(17,17,27,0.08); --border-strong: rgba(17,17,27,0.17);
      --text: #15151c; --muted: #5b5b67; --faint: #9a9aa6;
      --accent: #4f46e5; --accent-hover: #4338ca; --accent-fg: #4f46e5;
      --accent-soft: rgba(79,70,229,0.08); --accent-line: rgba(79,70,229,0.2);
      --tip: #ffffff; --grid: rgba(17,17,27,0.06); --axis: #9a9aa6;
    }
    * { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
    html { font-family: "Geist", system-ui, sans-serif; }
    body { margin: 0; background: var(--bg); }
    .tabular-nums { font-feature-settings: "tnum" 1; }
    .font-mono { font-family: "Geist Mono", ui-monospace, monospace; }
    ::-webkit-scrollbar { width: 11px; height: 11px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 99px; border: 3px solid var(--bg); }
    ::-webkit-scrollbar-thumb:hover { background: var(--faint); }
    select option { font-family: "Geist", system-ui, sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="ui.jsx"></script>
  <script type="text/babel" src="billing.jsx"></script>
  <script type="text/babel" src="clientviews.jsx"></script>
  <script type="text/babel" src="overview.jsx"></script>
  <script type="text/babel" src="deepdive.jsx"></script>
  <script type="text/babel" src="portal.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
  <script type="text/babel">
    const App = window.App;
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
